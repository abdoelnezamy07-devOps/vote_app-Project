apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: result-networkpolicy
  namespace: security
spec:
  podSelector:
    matchLabels:
      app: result
      tier: frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: ingress-nginx 
    ports:
    - protocol: TCP
      port: result-port 
  egress:
  - to:
      - podSelector:
          matchLabels:
            app: postgres # مسموح له يكلم الريديس بس
            tier: backend
    ports:
    - protocol: TCP
      port: c-db-port
  - to:
      - namespaceSelector: {}
    ports:
     - protocol: UDP
       port: 53
     - protocol: TCP
       port: 53 
